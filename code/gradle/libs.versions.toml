[versions]
agp = "9.2.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.7.1"
material = "1.13.0"
bcprovJdk18on = "1.80"
argon2kt = "1.6.0"
documentfile = "1.1.0"

[libraries]
